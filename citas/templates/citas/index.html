{% extends "citas/base.html" %}

{% block title %}Bienvenido - Clínica SaludPlus{% endblock %}

{% block content %}
<div class="row align-items-center">
    <div class="col-md-6 mb-4">
        <div class="card border-0 shadow-lg" style="min-height: 400px; display: flex; align-items: center; justify-content: center;">
            <div class="card-body text-center">
                <div style="font-size: 4rem; color: #E91E63; margin-bottom: 20px;">
                    <i class="bi bi-hospital"></i>
                </div>
                <h1 class="card-title mb-3">Clínica SaludPlus</h1>
                <p class="card-text text-muted mb-4">Sistema de Gestión de Citas Médicas</p>
                <a href="{% url 'login' %}" class="btn btn-primary btn-lg">Ingresar al Sistema</a>
            </div>
        </div>
    </div>
    <div class="col-md-6">
        <div class="row g-3">
            <div class="col-12">
                <div class="card stat-card">
                    <div class="stat-number">2</div>
                    <div class="stat-label">Médicos Activos</div>
                </div>
            </div>
            <div class="col-12">
                <div class="card stat-card">
                    <div class="stat-number">2</div>
                    <div class="stat-label">Pacientes Registrados</div>
                </div>
            </div>
            <div class="col-12">
                <div class="card stat-card">
                    <div class="stat-number">2</div>
                    <div class="stat-label">Citas Programadas</div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
